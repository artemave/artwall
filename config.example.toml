# artwall config — copy to ~/.config/artwall/config.toml and edit.
# Every key is optional; omitted keys keep their built-in default.
# Find QIDs with `python3 -m artwall --find <name>` or on wikidata.org.

# Inception-year window (negative = BC). Both optional.
date_begin = 1850
date_end = 1900

# Filters by Wikidata QID. Within a list values are OR'd; across the lists
# they're AND'd (so the below = Impressionist OR Post-Impressionist landscapes).
movements = ["Q40415", "Q166713"]  # Impressionism, Post-Impressionism
genres = ["Q191163"]               # landscape art
# artists = ["Q296", "Q5582"]      # Claude Monet, Vincent van Gogh

# Collections to draw from. The default is a curated set of clean-scan museums
# (Rijksmuseum, Nationalmuseum, SMK, NGA, Art Institute, Getty, Cleveland, MFA
# Boston). Override with your own QIDs, or set [] to draw from ALL ~400k paintings
# (more variety, but more framed-on-the-wall photos).
# collections = ["Q190804"]        # just the Rijksmuseum
# collections = []                 # all paintings

# Caption / label language (falls back to any language when unavailable).
language = "en"

# Caption point size. Omit to use the desktop's system font size (detected via
# gsettings/fontconfig), which is scaled per display so it looks the same
# physical size on HiDPI screens. Set it to override with an explicit point size.
# font_size = 11

# Caption placement: which corner, and the inset from the screen edges in pixels
# (absolute, so it sits the same fixed distance from the edge on every display).
# corner is one of top-left / top-right / bottom-left / bottom-right.
caption_corner = "bottom-right"
caption_pad_x = 24
caption_pad_y = 64

# How the caption is shown:
#   "link" (default) — an interactive overlay (run bin/artwall-overlay from your
#                      Sway config) with a clickable Wikipedia link; nothing is
#                      burned into the wallpaper. Needs PyGObject + gtk-layer-shell.
#   "text"           — burn the caption into the wallpaper. No overlay, no extra deps.
caption_mode = "link"

# Throttle for `--throttle` runs: skip if the last change was fewer than this
# many seconds ago (default 1800 = 30 min).
min_interval = 1800
